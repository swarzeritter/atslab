{% extends "base.html" %}
{% block title %}Редагувати профайл — Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h2 mb-4">
            <i class="bi bi-person-gear"></i> Редагувати профайл
        </h1>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="mb-3">
                    <span class="form-label text-muted small d-block">Ім'я користувача</span>
                    <p class="fw-semibold mb-0">{{ current_user.username }}</p>
                </div>
                <div class="mb-3">
                    <span class="form-label text-muted small d-block">Email</span>
                    <p class="mb-0">{{ current_user.email }}</p>
                </div>
                <hr>
                <form method="post" action="/profile/edit" id="edit-profile-form">
                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="bio">Про себе</label>
                        <textarea id="bio" name="bio" class="form-control" rows="4"
                                  placeholder="Розкажіть про себе...">{{ current_user.bio or '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Зберегти
                        </button>
                        <a href="/profile/{{ current_user.username }}"
                           class="btn btn-outline-secondary">Скасувати</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
