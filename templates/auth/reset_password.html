{% extends "base.html" %}
{% block title %}Новий пароль — Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 text-center mb-4">
                    <i class="bi bi-shield-lock"></i> Новий пароль
                </h1>

                {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}

                {% if token %}
                <form method="post" action="/auth/reset-password/{{ token }}" id="reset-password-form">
                    <div class="mb-3">
                        <label class="form-label" for="password">Новий пароль</label>
                        <input type="password" id="password" name="password" class="form-control"
                               required minlength="6" autocomplete="new-password">
                        <div class="form-text">Мінімум 6 символів</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="password_confirm">Підтвердження паролю</label>
                        <input type="password" id="password_confirm" name="password_confirm"
                               class="form-control" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        Зберегти пароль
                    </button>
                </form>
                {% endif %}

                <hr>
                <p class="text-center mb-0 text-muted small">
                    <a href="/auth/login">← Повернутися до входу</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
