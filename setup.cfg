[flake8]
max-line-length = 100
exclude = venv,__pycache__,.git,tests
per-file-ignores =
    __init__.py:F401

[tool:pytest]
filterwarnings =
    ignore::DeprecationWarning:httpx
    ignore::DeprecationWarning:jose


[pylint.main]
disable = C0114,C0115,C0116,R0903
max-line-length = 100
ignore = venv,tests
